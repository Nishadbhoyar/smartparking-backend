spring.application.name=smartparking
spring.datasource.url=jdbc:mysql://localhost:3306/newsmartdb?createDatabaseIfNotExist=true
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=your_jwt_secret_key_min_32_characters
jwt.expiration-ms=86400000

smartparking.upload.dir=/var/smartparking/uploads/valet_images/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB

spring.cache.type=simple

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

cors.allowed-origins=http://localhost:5173